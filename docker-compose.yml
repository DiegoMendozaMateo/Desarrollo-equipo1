services:
  db:
    image: mysql:8.0
    container_name: hospital-db
    restart: always
    environment:
      MYSQL_DATABASE: Hospital
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user_hospital
      MYSQL_PASSWORD: password_hospital
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: